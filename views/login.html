<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>החנות של רוני - כניסת מנהלים</title>
    <link rel="stylesheet" href="/css/style.css">
    <style>
        .login-page {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--bg-dark);
            padding: 1rem;
        }

        .login-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 3rem;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 4px 24px rgba(0,0,0,0.08);
        }

        .login-card .logo {
            display: block;
            text-align: center;
            font-size: 2rem;
            margin-bottom: 0.5rem;
        }

        .login-card h1 {
            text-align: center;
            font-size: 1.4rem;
            margin-bottom: 0.5rem;
            color: var(--text-primary);
        }

        .login-card .subtitle {
            text-align: center;
            color: var(--text-secondary);
            margin-bottom: 2rem;
            font-size: 0.9rem;
        }

        .login-error {
            background: rgba(220, 38, 38, 0.1);
            border: 1px solid var(--danger);
            color: var(--danger);
            padding: 10px 14px;
            border-radius: 8px;
            margin-bottom: 1rem;
            font-size: 0.9rem;
            display: none;
        }

        .login-error.show { display: block; }

        .login-card .form-group input {
            font-size: 1.05rem;
            padding: 12px 16px;
        }

        .login-card .btn-primary {
            width: 100%;
            justify-content: center;
            padding: 14px;
            font-size: 1.1rem;
            margin-top: 0.5rem;
        }

        .login-card .back-link {
            display: block;
            text-align: center;
            margin-top: 1.5rem;
            color: var(--text-secondary);
            font-size: 0.85rem;
        }

        .password-wrapper {
            position: relative;
        }

        .password-toggle {
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            font-size: 1.1rem;
            padding: 4px;
        }

        .password-toggle:hover { color: var(--accent-color); }
    </style>
</head>
<body>
    <div class="login-page">
        <div class="login-card">
            <a href="/" class="logo">החנות של רוני</a>
            <h1>כניסת מנהלים</h1>
            <p class="subtitle">הזן את פרטי ההתחברות שלך</p>

            <div class="login-error" id="loginError"></div>

            <form id="loginForm">
                <div class="form-group">
                    <label>שם משתמש</label>
                    <input type="text" id="username" name="username" required autocomplete="username" autofocus>
                </div>
                <div class="form-group">
                    <label>סיסמה</label>
                    <div class="password-wrapper">
                        <input type="password" id="password" name="password" required autocomplete="current-password">
                        <button type="button" class="password-toggle" onclick="togglePassword()">👁</button>
                    </div>
                </div>
                <button type="submit" class="btn btn-primary" id="loginBtn">כניסה</button>
            </form>

            <a href="/" class="back-link">חזרה לחנות</a>
        </div>
    </div>

    <script>
        // Redirect if already logged in
        const token = localStorage.getItem('admin_token');
        if (token) {
            fetch('/api/auth/verify', {
                headers: { 'Authorization': 'Bearer ' + token }
            }).then(res => {
                if (res.ok) window.location.href = '/admin';
            });
        }

        function togglePassword() {
            const input = document.getElementById('password');
            input.type = input.type === 'password' ? 'text' : 'password';
        }

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const errorEl = document.getElementById('loginError');
            const btn = document.getElementById('loginBtn');
            errorEl.classList.remove('show');
            btn.disabled = true;
            btn.textContent = 'מתחבר...';

            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;

            try {
                const res = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password }),
                });

                const data = await res.json();

                if (!res.ok) {
                    errorEl.textContent = data.error || 'שגיאה בהתחברות';
                    errorEl.classList.add('show');
                    btn.disabled = false;
                    btn.textContent = 'כניסה';
                    return;
                }

                localStorage.setItem('admin_token', data.token);
                localStorage.setItem('admin_user', JSON.stringify(data.user));
                window.location.href = '/admin';
            } catch (err) {
                errorEl.textContent = 'שגיאת חיבור. נסה שוב.';
                errorEl.classList.add('show');
                btn.disabled = false;
                btn.textContent = 'כניסה';
            }
        });
    </script>
</body>
</html>
